<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Shopping</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f5f0e8;
            --ink: #1a1208;
            --gold: #c9a84c;
            --gold-light: #e8d5a3;
            --warm-gray: #8a7f72;
            --accent: #b85c38;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Grain overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
            opacity: 0.6;
        }

        /* Decorative background shapes */
        .bg-deco {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-deco::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
            top: -100px;
            right: -100px;
        }
        .bg-deco::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(184,92,56,0.08) 0%, transparent 70%);
            bottom: -80px;
            left: -80px;
        }

        /* Main container */
        .scene {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Header label */
        .label {
            font-size: 10px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 500;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .label::before, .label::after {
            content: '';
            display: block;
            width: 32px;
            height: 1px;
            background: var(--gold);
            opacity: 0.6;
        }

        /* Card */
        .card {
            background: white;
            width: 360px;
            border-radius: 2px;
            overflow: hidden;
            box-shadow:
                0 1px 1px rgba(26,18,8,0.04),
                0 4px 12px rgba(26,18,8,0.06),
                0 20px 48px rgba(26,18,8,0.10);
            position: relative;
        }

        /* Product image area */
        .product-visual {
            height: 260px;
            background: linear-gradient(160deg, #ede5d8 0%, #d9ccba 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-visual::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 60% 30%, rgba(255,255,255,0.4) 0%, transparent 60%);
        }

        /* Doll illustration (pure CSS) */
        .doll {
            position: relative;
            z-index: 1;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-10px); }
        }

        .doll-body {
            width: 80px;
            height: 100px;
            background: linear-gradient(180deg, #e8b4b8 0%, #d4919a 100%);
            border-radius: 40px 40px 30px 30px;
            position: relative;
            margin: 0 auto;
            box-shadow: 0 8px 24px rgba(212,145,154,0.4);
        }

        .doll-head {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #fde6d0 0%, #f5c8a8 100%);
            border-radius: 50%;
            position: absolute;
            top: -38px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 12px rgba(245,200,168,0.5);
        }

        .doll-eyes {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 14px;
        }

        .doll-eye {
            width: 7px;
            height: 9px;
            background: var(--ink);
            border-radius: 50%;
        }

        .doll-blush-l, .doll-blush-r {
            position: absolute;
            width: 12px;
            height: 8px;
            background: rgba(255,160,160,0.45);
            border-radius: 50%;
            top: 28px;
        }
        .doll-blush-l { left: 7px; }
        .doll-blush-r { right: 7px; }

        .doll-smile {
            position: absolute;
            bottom: 13px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 8px;
            border-bottom: 2px solid rgba(180,100,100,0.7);
            border-radius: 0 0 12px 12px;
        }

        .doll-hair {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 64px;
            height: 32px;
            background: linear-gradient(180deg, #5a3825 0%, #7a4e35 100%);
            border-radius: 50% 50% 0 0;
        }

        .doll-hair::before, .doll-hair::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 48px;
            background: linear-gradient(180deg, #5a3825 0%, #7a4e35 100%);
            border-radius: 0 0 12px 12px;
            top: 18px;
        }
        .doll-hair::before { left: -4px; }
        .doll-hair::after  { right: -4px; }

        .doll-arms {
            position: absolute;
            top: 10px;
            width: 100%;
        }

        .doll-arm {
            position: absolute;
            width: 22px;
            height: 10px;
            background: #d4919a;
            border-radius: 5px;
            top: 0;
        }
        .doll-arm.left  { left: -18px; transform: rotate(25deg); }
        .doll-arm.right { right: -18px; transform: rotate(-25deg); }

        .doll-dress-hem {
            position: absolute;
            bottom: -14px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 20px;
            background: linear-gradient(180deg, #d4919a 0%, #c47882 100%);
            border-radius: 0 0 50% 50%;
        }

        /* Corner badge */
        .badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--ink);
            color: var(--gold-light);
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 5px 10px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
        }

        /* Card content */
        .card-body {
            padding: 28px 32px 32px;
        }

        .product-category {
            font-size: 10px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--warm-gray);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .product-name {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--ink);
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .product-name em {
            font-style: italic;
            color: var(--accent);
        }

        .divider {
            width: 40px;
            height: 1px;
            background: var(--gold);
            margin: 16px 0;
        }

        .price-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
            margin-bottom: 6px;
        }

        .price-currency {
            font-size: 14px;
            color: var(--warm-gray);
            font-weight: 300;
        }

        .price-amount {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            color: var(--ink);
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .price-note {
            font-size: 11px;
            color: var(--warm-gray);
            font-weight: 300;
            letter-spacing: 0.04em;
        }

        /* Buy button */
        .btn-buy {
            display: block;
            width: 100%;
            margin-top: 24px;
            padding: 16px;
            background: var(--ink);
            color: var(--gold-light);
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        .btn-buy::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(201,168,76,0.15) 50%, transparent 100%);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .btn-buy:hover { background: #2e2516; }
        .btn-buy:hover::before { transform: translateX(100%); }

        .btn-buy:active { transform: scale(0.99); }

        /* Status */
        #status {
            margin-top: 18px;
            font-size: 12px;
            letter-spacing: 0.08em;
            color: var(--warm-gray);
            min-height: 18px;
            font-weight: 300;
            text-align: center;
            transition: all 0.4s ease;
        }

        #status.active {
            color: var(--accent);
            font-weight: 500;
        }

        #status.success {
            color: #4a7c59;
            font-weight: 500;
        }

        /* Bottom line */
        .bottom-line {
            margin-top: 28px;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(138,127,114,0.5);
        }
    </style>
</head>
<body>
    <div class="bg-deco"></div>

    <div class="scene">
        <div class="label">Exclusive Collection</div>

        <div class="card">
            <div class="product-visual">
                <span class="badge">Limited</span>
                <div class="doll">
                    <div class="doll-body">
                        <div class="doll-hair"></div>
                        <div class="doll-head">
                            <div class="doll-blush-l"></div>
                            <div class="doll-blush-r"></div>
                            <div class="doll-eyes">
                                <div class="doll-eye"></div>
                                <div class="doll-eye"></div>
                            </div>
                            <div class="doll-smile"></div>
                        </div>
                        <div class="doll-arms">
                            <div class="doll-arm left"></div>
                            <div class="doll-arm right"></div>
                        </div>
                        <div class="doll-dress-hem"></div>
                    </div>
                </div>
            </div>

            <div class="card-body">
                <p class="product-category">Artisan Collectible</p>
                <h2 class="product-name">The <em>Cyano</em> Doll</h2>
                <div class="divider"></div>
                <div class="price-row">
                    <span class="price-currency">USD</span>
                    <span class="price-amount">1,000,000</span>
                </div>
                <p class="price-note">One-of-a-kind · Free white-glove delivery</p>
                <button class="btn-buy" onclick="buyItem()">Acquire Now</button>
            </div>
        </div>

        <div id="status">Awaiting your decision</div>
        <p class="bottom-line">Est. 2025 &nbsp;·&nbsp; Handcrafted</p>
    </div>

    <script>
        async function buyItem() {
            const statusEl = document.getElementById('status');
            const price = 1000000;

            if (price < 1000000) {
                alert("It's an abnormal price!");
                return;
            }

            statusEl.className = 'active';
            statusEl.innerText = "Contacting our atelier…";

            try {
                const res = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ item: "Cyano Doll", price: price })
                });
                const data = await res.json();
                statusEl.className = 'success';
                statusEl.innerText = data.message;
            } catch (e) {
                statusEl.className = 'active';
                statusEl.innerText = "Request sent — awaiting confirmation.";
            }
        }
    </script>
</body>
</html>
